<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <title>STUDY CALL VID WEB</title>
  </head>
  <body>
    <div id="lobby-container">
      <div id="lobby-box">
        <div id="guest-section">
          <input type="text" id="room-id" placeholder="Nhập ID phòng" />
          <button id="join-btn">Tham gia</button>
        </div>

        <p>Hoặc</p>

        <div id="host-section">
          <button id="create-room-btn">Tạo phòng mới</button>

          <div id="host-setup" class="hidden" style="margin-top: 15px;">
            <p>ID phòng của bạn: <strong id="generated-id">Đang tạo...</strong></p>
            <label>
              <input type="checkbox" id="require-password"> Yêu cầu mật khẩu
            </label>
            <div id="room-password-container" class="hidden">
              <input type="text" id="room-password-input" placeholder="Nhập mật khẩu phòng" />
              <button id="room-password-btn">Xác nhận</button>
            </div>
            <br><br>
            <button id="start-call-btn">Bắt đầu cuộc gọi</button>
          </div>
        </div>
      </div>
    </div>
    <div class="screen hidden">
      <!-- <div class="top-box"></div> -->
      <div class="middle-box">
        <div class="video-box">
          <video id="remoteVideo" autoplay playsinline></video>
          <div class="my-webcam">
            <video id="localVideo" autoplay playsinline muted></video>
          </div>
        </div>
        <div id="chat-box" class="chat-container hidden">
          <div class="chat-messages">
            <div class="message received">
              <span class="sender-name">Nguyen Van A</span>
              <div class="bubble">Hello!</div>
            </div>
            <div class="message sent">
              <div class="bubble">Hi!</div>
            </div>
          </div>
          <div class="chat-input-area">
            <input placeholder="@ Nhập tin nhắn..." />
            <button class="send-btn">
              <span class="material-symbols-outlined">send</span>
            </button>
          </div>
        </div>
      </div>

      <div class="bottom-box">
        <div class="left-control">
          <span class="call-time">00:15:09</span>
        </div>
        <div class="center-control">
          <button id="mic-btn" class="control-btn">
            <span class="material-symbols-outlined">mic</span>
          </button>
          <button id="cam-btn" class="control-btn">
            <span class="material-symbols-outlined">video_camera_front</span>
          </button>
          <button id="record-btn" class="control-btn">
            <span class="material-symbols-outlined">screen_record</span>
          </button>
          <button id="msg-btn" class="control-btn">
            <span class="material-symbols-outlined">message</span>
          </button>
          <!-- <button class="btn-control">
            <span class="material-symbols-outlined">more_vert</span>
          </button> -->
          <button class="call-btn btn-danger">
            <span class="material-symbols-outlined">call_end</span>
          </button>
        </div>
      </div>
    </div>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
